<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" width="100%" height="100%">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/><stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/><stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/><stop offset="100%" stop-color="#fae8ff"/>
    </linearGradient>
    <linearGradient id="g-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/><stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/><stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <!-- Mini node bg colors -->
    <linearGradient id="g-orange-mini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/><stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="g-emerald-mini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/><stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="g-blue-mini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/><stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="g-teal-mini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/><stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="g-green-mini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/><stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="g-red-mini" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/><stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <!-- Arrow head marker -->
    <marker id="arrow-down" viewBox="0 0 10 8" refX="5" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 8" refX="5" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#e11d48"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 8" refX="5" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#f59e0b"/>
    </marker>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- ===== 1. INPUT NODE ===== -->
  <rect x="275" y="10" width="250" height="68" rx="12" fill="url(#g-blue)" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="37" text-anchor="middle" font-size="18" fill="#1e40af" font-weight="bold">💡 用户输入</text>
  <text x="400" y="57" text-anchor="middle" font-size="11" fill="#6b7280">用日常语言描述你的 APP 构想</text>

  <!-- Arrow: Input → Orchestrator -->
  <line x1="400" y1="78" x2="400" y2="100" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="395,98 400,106 405,98" fill="#9ca3af"/>

  <!-- ===== 2. MEMORY + ORCHESTRATOR ROW ===== -->
  <!-- Memory node (left) -->
  <rect x="35" y="112" width="195" height="68" rx="12" fill="url(#g-rose)" stroke="#fda4af" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="132" y="138" text-anchor="middle" font-size="17" fill="#be123c" font-weight="bold">🗄️ Memory</text>
  <text x="132" y="155" text-anchor="middle" font-size="11" fill="#9f1239" font-weight="600">外部记忆文件</text>
  <text x="132" y="171" text-anchor="middle" font-size="9" fill="#9ca3af">长期/短期 · 状态/进度/决策</text>

  <!-- Orchestrator node (centered) -->
  <rect x="260" y="112" width="280" height="68" rx="12" fill="url(#g-amber)" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="138" text-anchor="middle" font-size="17" fill="#c2410c" font-weight="bold">🧠 Orchestrator 总调度器</text>
  <text x="400" y="158" text-anchor="middle" font-size="11" fill="#9a3412">读取状态 → 判断 → 路由 → 追踪</text>

  <!-- Bidirectional arrows: Memory ↔ Orchestrator -->
  <!-- Top arrow: Memory → Orchestrator (提取) -->
  <line x1="230" y1="130" x2="258" y2="130" stroke="#e11d48" stroke-width="1.2" stroke-dasharray="4 2"/>
  <polygon points="255,127 260,130 255,133" fill="#e11d48"/>
  <text x="244" y="124" text-anchor="middle" font-size="8" fill="#e11d48" font-weight="600">提取</text>
  <!-- Bottom arrow: Orchestrator → Memory (更新) -->
  <line x1="258" y1="162" x2="232" y2="162" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4 2"/>
  <polygon points="235,159 230,162 235,165" fill="#f59e0b"/>
  <text x="244" y="174" text-anchor="middle" font-size="8" fill="#f59e0b" font-weight="600">更新</text>

  <!-- Arrow: Orchestrator → Phase 0 -->
  <line x1="400" y1="180" x2="400" y2="202" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="395,200 400,208 405,200" fill="#9ca3af"/>

  <!-- ===== 3. PHASE 0 + PHASE 1-N SIDE BY SIDE ===== -->
  <!-- Phase 0 container (left) -->
  <rect x="18" y="214" width="372" height="440" rx="14" fill="url(#g-purple)" stroke="#c084fc" stroke-width="1.5"/>

  <!-- Phase 0 header badge -->
  <rect x="80" y="224" width="248" height="26" rx="13" fill="#e9d5ff" stroke="#c084fc" stroke-width="0.5"/>
  <text x="204" y="241" text-anchor="middle" font-size="11" fill="#7e22ce" font-weight="700">📋 Phase 0 — 规划阶段</text>
  <text x="310" y="241" text-anchor="middle" font-size="10" fill="#a855f7">6个Agent · 严格串行</text>

  <!-- Phase 0 agents -->
  <!-- Agent 1: 产品方案设计专家 -->
  <rect x="42" y="264" width="324" height="42" rx="8" fill="white" fill-opacity="0.7" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="54" y="282" font-size="15">📝</text>
  <text x="76" y="281" font-size="11" fill="#374151" font-weight="600">产品方案设计专家</text>
  <text x="76" y="295" font-size="9" fill="#9ca3af">→ 产品需求文档</text>

  <line x1="204" y1="306" x2="204" y2="318" stroke="#c084fc" stroke-width="1"/>
  <polygon points="202,316 204,320 206,316" fill="#c084fc"/>

  <!-- Agent 2: 技术架构师 -->
  <rect x="42" y="324" width="324" height="42" rx="8" fill="white" fill-opacity="0.7" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="54" y="342" font-size="15">🏗️</text>
  <text x="76" y="341" font-size="11" fill="#374151" font-weight="600">技术架构师</text>
  <text x="76" y="355" font-size="9" fill="#9ca3af">→ 技术方案</text>

  <line x1="204" y1="366" x2="204" y2="378" stroke="#c084fc" stroke-width="1"/>
  <polygon points="202,376 204,380 206,376" fill="#c084fc"/>

  <!-- Agent 3: 编码规范专家 -->
  <rect x="42" y="384" width="324" height="42" rx="8" fill="white" fill-opacity="0.7" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="54" y="402" font-size="15">📏</text>
  <text x="76" y="401" font-size="11" fill="#374151" font-weight="600">编码规范专家</text>
  <text x="76" y="415" font-size="9" fill="#9ca3af">→ 代码规范文档</text>

  <line x1="204" y1="426" x2="204" y2="438" stroke="#c084fc" stroke-width="1"/>
  <polygon points="202,436 204,440 206,436" fill="#c084fc"/>

  <!-- Agent 4: 数据库设计专家 -->
  <rect x="42" y="444" width="324" height="42" rx="8" fill="white" fill-opacity="0.7" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="54" y="462" font-size="15">🗄️</text>
  <text x="76" y="461" font-size="11" fill="#374151" font-weight="600">数据库设计专家</text>
  <text x="76" y="475" font-size="9" fill="#9ca3af">→ Schema 文档</text>

  <line x1="204" y1="486" x2="204" y2="498" stroke="#c084fc" stroke-width="1"/>
  <polygon points="202,496 204,500 206,496" fill="#c084fc"/>

  <!-- Agent 5: API 接口设计专家 -->
  <rect x="42" y="504" width="324" height="42" rx="8" fill="white" fill-opacity="0.7" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="54" y="522" font-size="15">🔌</text>
  <text x="76" y="521" font-size="11" fill="#374151" font-weight="600">API 接口设计专家</text>
  <text x="76" y="535" font-size="9" fill="#9ca3af">→ 接口文档</text>

  <line x1="204" y1="546" x2="204" y2="558" stroke="#c084fc" stroke-width="1"/>
  <polygon points="202,556 204,560 206,556" fill="#c084fc"/>

  <!-- Agent 6: 编码任务拆分专家 -->
  <rect x="42" y="564" width="324" height="42" rx="8" fill="white" fill-opacity="0.7" stroke="#e9d5ff" stroke-width="0.5"/>
  <text x="54" y="582" font-size="15">📋</text>
  <text x="76" y="581" font-size="11" fill="#374151" font-weight="600">编码任务拆分专家</text>
  <text x="76" y="595" font-size="9" fill="#9ca3af">→ 分阶段编码任务书</text>

  <!-- Divider between Phase 0 and Phase 1-N -->
  <text x="400" y="400" text-anchor="middle" font-size="9" fill="#9ca3af" font-weight="600">规 划 完 成</text>
  <text x="400" y="430" text-anchor="middle" font-size="9" fill="#9ca3af" font-weight="600">↓</text>
  <text x="400" y="460" text-anchor="middle" font-size="9" fill="#9ca3af" font-weight="600">开 始 构 建</text>

  <!-- Phase 1-N container (right) -->
  <rect x="410" y="214" width="372" height="440" rx="14" fill="url(#g-indigo)" stroke="#a5b4fc" stroke-width="1.5"/>

  <!-- Phase 1-N header badge -->
  <rect x="472" y="224" width="248" height="26" rx="13" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="0.5"/>
  <text x="596" y="241" text-anchor="middle" font-size="11" fill="#3730a3" font-weight="700">💻 Phase 1-N — 构建阶段</text>
  <text x="702" y="241" text-anchor="middle" font-size="10" fill="#6366f1">6个Agent · 混合串并行</text>

  <!-- Agent-DB -->
  <rect x="460" y="264" width="272" height="38" rx="8" fill="url(#g-orange-mini)" stroke="#fdba74" stroke-width="0.5"/>
  <text x="475" y="280" font-size="14">🗃️</text>
  <text x="497" y="279" font-size="11" fill="#374151" font-weight="600">Agent-DB</text>
  <text x="497" y="292" font-size="9" fill="#9ca3af">建表 + RLS 权限策略</text>

  <line x1="596" y1="302" x2="596" y2="314" stroke="#a5b4fc" stroke-width="0.8"/>
  <polygon points="594,312 596,316 598,312" fill="#a5b4fc"/>

  <!-- Parallel: Agent-FE + Agent-BE -->
  <rect x="455" y="322" width="130" height="38" rx="8" fill="url(#g-emerald-mini)" stroke="#6ee7b7" stroke-width="0.5"/>
  <text x="468" y="338" font-size="14">🎨</text>
  <text x="488" y="337" font-size="10" fill="#374151" font-weight="600">Agent-FE</text>
  <text x="488" y="350" font-size="8" fill="#9ca3af">前端页面 + Mock</text>

  <text x="596" y="342" text-anchor="middle" font-size="12" fill="#6366f1">⟺ 并行</text>

  <rect x="610" y="322" width="130" height="38" rx="8" fill="url(#g-blue-mini)" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="623" y="338" font-size="14">🔧</text>
  <text x="643" y="337" font-size="10" fill="#374151" font-weight="600">Agent-BE</text>
  <text x="643" y="350" font-size="8" fill="#9ca3af">后端 + 接口</text>

  <!-- Arrows from FE+BE to CONNECT -->
  <line x1="520" y1="360" x2="520" y2="368" stroke="#a5b4fc" stroke-width="0.8"/>
  <line x1="675" y1="360" x2="675" y2="368" stroke="#a5b4fc" stroke-width="0.8"/>
  <line x1="520" y1="368" x2="596" y2="374" stroke="#a5b4fc" stroke-width="0.8"/>
  <line x1="675" y1="368" x2="596" y2="374" stroke="#a5b4fc" stroke-width="0.8"/>
  <polygon points="594,372 596,376 598,372" fill="#a5b4fc"/>

  <!-- Agent-CONNECT -->
  <rect x="460" y="380" width="272" height="38" rx="8" fill="url(#g-teal-mini)" stroke="#5eead4" stroke-width="0.5"/>
  <text x="475" y="396" font-size="14">🔗</text>
  <text x="497" y="395" font-size="11" fill="#374151" font-weight="600">Agent-CONNECT</text>
  <text x="497" y="408" font-size="9" fill="#9ca3af">Mock → 真实 API 联调</text>

  <line x1="596" y1="418" x2="596" y2="430" stroke="#a5b4fc" stroke-width="0.8"/>
  <polygon points="594,428 596,432 598,428" fill="#a5b4fc"/>

  <!-- Agent-VERIFY with pass/fail branches -->
  <rect x="460" y="438" width="272" height="38" rx="8" fill="url(#g-green-mini)" stroke="#86efac" stroke-width="0.5"/>
  <text x="475" y="454" font-size="14">✅</text>
  <text x="497" y="453" font-size="11" fill="#374151" font-weight="600">Agent-VERIFY</text>
  <text x="497" y="466" font-size="9" fill="#9ca3af">验收测试</text>

  <!-- Pass branch (left) -->
  <line x1="520" y1="476" x2="520" y2="498" stroke="#34d399" stroke-width="1.2"/>
  <polygon points="517,496 520,502 523,496" fill="#34d399"/>
  <text x="518" y="514" text-anchor="middle" font-size="9" fill="#059669" font-weight="600">✅ 通过 → 下一任务</text>

  <!-- Fail branch (right) - goes to FIX -->
  <line x1="675" y1="476" x2="675" y2="498" stroke="#f87171" stroke-width="1.2"/>
  <polygon points="672,496 675,502 678,496" fill="#f87171"/>
  <text x="677" y="514" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">❌ 失败</text>

  <!-- Agent-FIX (below fail branch) -->
  <rect x="585" y="522" width="180" height="38" rx="8" fill="url(#g-red-mini)" stroke="#fca5a5" stroke-width="0.5"/>
  <text x="600" y="538" font-size="14">🩹</text>
  <text x="622" y="537" font-size="10" fill="#374151" font-weight="600">Agent-FIX</text>
  <text x="622" y="550" font-size="8" fill="#9ca3af">精确修复补丁</text>

  <!-- Loop arrow: FIX → VERIFY (curved path on right side) -->
  <path d="M 765,555 L 785,555 Q 792,555 792,548 L 792,468 Q 792,457 783,457 L 734,457" fill="none" stroke="#f87171" stroke-width="1.2" stroke-dasharray="4 2"/>
  <polygon points="736,454 732,457 736,460" fill="#f87171"/>
  <text x="795" y="510" font-size="8" fill="#f87171" font-weight="500">重新测试</text>

  <!-- Arrow: Phase 0 + Phase 1-N → Review -->
  <line x1="400" y1="654" x2="400" y2="676" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="395,674 400,682 405,674" fill="#9ca3af"/>

  <!-- ===== 4. MILESTONE REVIEW ===== -->
  <rect x="265" y="688" width="270" height="68" rx="12" fill="url(#g-rose)" stroke="#fda4af" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="715" text-anchor="middle" font-size="17" fill="#be123c" font-weight="bold">🔍 里程碑审查</text>
  <text x="400" y="736" text-anchor="middle" font-size="11" fill="#9f1239">新对话 · 零"必须修复"项</text>

  <!-- Arrow: Review → Done -->
  <line x1="400" y1="756" x2="400" y2="778" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="395,776 400,784 405,776" fill="#9ca3af"/>

  <!-- ===== 5. COMPLETE APP ===== -->
  <rect x="255" y="790" width="290" height="72" rx="14" fill="url(#g-green)" stroke="#6ee7b7" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="818" text-anchor="middle" font-size="18" fill="#065f46" font-weight="bold">🚀 完整可运行的 APP</text>
  <text x="400" y="842" text-anchor="middle" font-size="11" fill="#047857">React Native · Expo + Supabase · 全栈交付</text>

</svg>
